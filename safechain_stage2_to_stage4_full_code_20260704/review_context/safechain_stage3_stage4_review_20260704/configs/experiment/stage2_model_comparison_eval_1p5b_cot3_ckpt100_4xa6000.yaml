defaults:
  - stage2_model_comparison_eval.yaml
  - ../model/deepseek_r1_distill_qwen_1_5b.yaml
  - ../runtime/a6000_4x.yaml

run:
  name: stage2_model_comparison_eval_deepseek_1p5b_cot3_ckpt100_4xa6000
  output_dir: ${COT_SAFETY_RUN_ROOT:-/workspace/cot-safety/runs}/eval/stage2_model_comparison_deepseek_1p5b_cot3_ckpt100_4xa6000

eval:
  devices: ["0", "1", "2", "3"]
  model_conditions:
    - label: cot3_full_sft_ckpt100
      kind: sft
      path: ${COT_SAFETY_OUTPUT_ROOT:-/workspace/outputs}/deepseek_1p5b_intra_pause_cot3_trusted_cot_18k_4xa6000/checkpoint-100
      generation_backend: vllm
      insert_pause_after_cot_tokens: 3
      n_insert_pauses: 3
      batch_size: 32
  generation:
    generation_backend: vllm
    chunk_size: 300
    vllm:
      gpu_memory_utilization: 0.90
      max_num_seqs: 32
  data:
    prepared_dir: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/model_comparison_eval/deepseek_1p5b_stage2
  judging:
    judge_backend: vllm
    chunk_size: 300
    batch_size:
      wildguard: 16
      llamaguard: 16
      harmbench: 4
    device_map:
      llamaguard: auto

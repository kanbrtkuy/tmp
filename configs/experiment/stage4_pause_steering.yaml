defaults:
  - ../model/deepseek_r1_distill_qwen_1_5b.yaml
  - ../data/stage4_steering_eval_sources.yaml
  - ../runtime/a100_4x.yaml

run:
  name: stage4_pause_only_steering_deepseek_1p5b
  output_dir: ${COT_SAFETY_RUN_ROOT:-runs}/stage4_pause_only_steering_deepseek_1p5b

steering:
  method: learned_delta
  deprecated: true
  acknowledge_deprecated: false
  target_positions: [pause_0, pause_1, pause_2]
  forbidden_target_prefixes: [pre_pause_, post_pause_, cot_, control_cot_]
  layer: 14
  init: zero
  steps: 80
  safe_weight: 1.0
  unsafe_weight: 1.0
  l2: 0.001
  alpha_grid: [0.0, 1.0, 2.0]
  seeds: [260618, 260619, 260620]
  loss:
    safe: minimize_post_pause_reasoning_nll
    unsafe: maximize_post_pause_reasoning_nll

eval:
  model_conditions: [base, sft, sft_steering]
  dataset_specs:
    - name: xstest_safe
      input_file: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/intra_pause_hardsafe_steering_eval/xstest_safe.jsonl
      label_filter: safe
      rows_per_label: 250
    - name: xstest_contrast_unsafe
      input_file: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/intra_pause_hardsafe_steering_eval/xstest_contrast_unsafe.jsonl
      label_filter: unsafe
      rows_per_label: 250
    - name: or_bench_hard_safe
      input_file: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/intra_pause_hardsafe_steering_eval/or_bench_hard_safe.jsonl
      label_filter: safe
      rows_per_label: 300
    - name: or_bench_toxic_unsafe
      input_file: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/intra_pause_hardsafe_steering_eval/or_bench_toxic_unsafe.jsonl
      label_filter: unsafe
      rows_per_label: 300
  # Main Stage 4 writes one open_judges_normalized.jsonl per generation shard.
  # Keep the primary run single-judge when using vLLM; run second judges as
  # per-judge passes.
  judges: [wildguard]
  second_judges: [llamaguard, harmbench]
  scheduler: dynamic_claim
  judge_backend: ${STAGE4_JUDGE_BACKEND:-vllm}
  vllm_judges: [wildguard, llamaguard, harmbench]
  judge_model_map:
    wildguard: ${COT_SAFETY_JUDGE_ROOT:-/workspace/models/judges}/wildguard
    llamaguard: ${COT_SAFETY_JUDGE_ROOT:-/workspace/models/judges}/Llama-Guard-3-8B
    harmbench: ${COT_SAFETY_JUDGE_ROOT:-/workspace/models/judges}/HarmBench-Llama-2-13b-cls
  capability: [gsm8k, math500]
  safety: [strongreject, harmbench_behaviors, jailbreakbench, xtest_hard_safe, or_bench_hard_safe, squad_benign]

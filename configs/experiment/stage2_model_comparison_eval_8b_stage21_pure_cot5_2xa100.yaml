defaults:
  - stage2_model_comparison_eval.yaml
  - ../model/deepseek_r1_distill_llama_8b.yaml
  - ../runtime/a100_2x.yaml

run:
  name: stage2_model_comparison_eval_deepseek_8b_stage21_pure_cot5_2xa100
  output_dir: ${COT_SAFETY_RUN_ROOT:-/workspace/cot-safety/runs}/eval/stage2_model_comparison_deepseek_8b_stage21_pure_cot5_2xa100

eval:
  devices: ["0", "1"]
  model_conditions:
    - label: base_natural
      kind: base
      path: ${COT_SAFETY_MODEL_ROOT:-/workspace/models}/DeepSeek-R1-Distill-Llama-8B
      generation_backend: vllm
      insert_pause_after_cot_tokens: -1
      n_insert_pauses: 0
      batch_size: 32
    - label: stage21_pure_cot5_natural
      kind: sft
      path: ${STAGE21_PURE_8B_CHECKPOINT:-/workspace/outputs/deepseek_8b_stage21_pause_pure_cot5_full_2xa100/final}
      generation_backend: vllm
      insert_pause_after_cot_tokens: -1
      n_insert_pauses: 0
      batch_size: 32
    - label: stage21_pure_cot5_forced
      kind: sft
      path: ${STAGE21_PURE_8B_CHECKPOINT:-/workspace/outputs/deepseek_8b_stage21_pause_pure_cot5_full_2xa100/final}
      generation_backend: vllm
      insert_pause_after_cot_tokens: 5
      n_insert_pauses: 3
      batch_size: 32
  generation:
    generation_backend: vllm
    chunk_size: 300
    vllm:
      gpu_memory_utilization: 0.90
      max_num_seqs: 32
  data:
    prepared_dir: ${COT_SAFETY_DATA_ROOT:-/workspace/data}/model_comparison_eval/deepseek_8b_stage21_pure
  judging:
    judge_backend: vllm
    chunk_size: 300
    model_map:
      wildguard: ${COT_SAFETY_WILDGUARD_MODEL:-/workspace/models/judges/wildguard_vllm_head_dim128}
      llamaguard: ${COT_SAFETY_JUDGE_ROOT:-/workspace/models/judges}/Llama-Guard-3-8B
      harmbench: ${COT_SAFETY_JUDGE_ROOT:-/workspace/models/judges}/HarmBench-Llama-2-13b-cls
    batch_size:
      wildguard: 16
      llamaguard: 16
      harmbench: 4
    device_map:
      llamaguard: auto

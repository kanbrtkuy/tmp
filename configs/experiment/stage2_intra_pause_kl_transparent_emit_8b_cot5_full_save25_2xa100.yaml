defaults:
  - stage2_intra_pause_kl_transparent_emit_8b_cot5_save50_max400_4xa100.yaml
  - ../runtime/a100_2x.yaml

run:
  name: stage2_intra_pause_kl_transparent_emit_deepseek_8b_cot5_full_save25_mb4_ga2_2xa100
  output_dir: ${COT_SAFETY_OUTPUT_ROOT:-/workspace/outputs}/deepseek_8b_intra_pause_cot5_kl_transparent_emit_trusted_cot_18k_full_save25_mb4_ga2_2xa100

sft:
  tags:
    - deepseek_8b
    - intra_pause_cot5
    - after_cot4_before_cot5
    - kl_transparent_emit
    - full_stage2
    - a100_2x
  num_train_epochs: 1.0
  max_steps: null
  save_steps: 25
  eval_steps: 25
  save_total_limit: 8
  load_best_model_at_end: true
  early_stopping:
    enabled: true
    patience: 6
    threshold: 0.0005
  pause_kl:
    invariant_check_interval_steps: 25
  hot_checkpoint_sync:
    enabled: true
    interval_seconds: 30
    remove_hot_after_sync: true
    keep_latest_hot: 1
    keep_best_hot: true
    sync_output_after_stop: true
    remove_hot_output_after_stop: true
    timeout_seconds: 1800

runtime:
  sft:
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 2
    dataloader_num_workers: 16

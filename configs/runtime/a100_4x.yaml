runtime:
  name: a100_4x_80g
  num_gpus: 4
  cuda_visible_devices: "0,1,2,3"
  devices: [cuda:0, cuda:1, cuda:2, cuda:3]
  hf_home: ${HF_HOME:-/workspace/hf_cache}
  hf_env_file: /workspace/secrets/hf.env
  workdir: /workspace/cot-safety
  data_root: /workspace/data
  output_root: /workspace/outputs
  run_root: /workspace/cot-safety/runs
  torch_dtype: bfloat16
  pytorch_cuda_alloc_conf: expandable_segments:True
  sft:
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
  hidden:
    extract_jobs: 4
    extract_devices: [cuda:0, cuda:1, cuda:2, cuda:3]
    batch_size_per_gpu: 20
    compression: uncompressed
  probes:
    jobs: 48
    devices: [cuda:0, cuda:1, cuda:2, cuda:3]
    jobs_per_gpu: 12
    multilayer_jobs: 4
    multilayer_fallback_device: cpu
    cpu_threads_per_job: 2
    probe_timeout_seconds: 0
    device: cuda
  generation:
    workers: 4
    batch_size_per_gpu: 16
  judging:
    workers: 2
    batch_size_per_gpu: 1

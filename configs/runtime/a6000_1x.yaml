runtime:
  name: a6000_1x
  num_gpus: 1
  cuda_visible_devices: "0"
  hf_home: ${HF_HOME:-/workspace/hf_cache}
  hf_env_file: ${COT_SAFETY_HF_ENV_FILE:-/workspace/secrets/hf.env}
  workdir: ${COT_SAFETY_WORKDIR:-/workspace/cot-safety}
  data_root: ${COT_SAFETY_DATA_ROOT:-/workspace/data}
  output_root: ${COT_SAFETY_OUTPUT_ROOT:-/workspace/outputs}
  run_root: ${COT_SAFETY_RUN_ROOT:-/workspace/cot-safety/runs}
  torch_dtype: bfloat16
  sft:
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    gradient_checkpointing: true
  hidden:
    extract_jobs: 1
    extract_train_shards: 1
    batch_size_per_gpu: 4
  probes:
    single_scan_backend: batched
    # Probe training is made of many small linear/MLP jobs. On a single A6000,
    # one worker leaves GPU/CPU mostly idle, so run several small workers in
    # parallel while keeping per-job CPU threads low to avoid oversubscription.
    dynamic_task_multiplier: 12
    jobs: 48
    worker_slots_per_gpu: 12
    jobs_per_gpu: 12
    scan_batch_size: 1024
    scan_eval_batch_size: 4096
    multilayer_jobs: 12
    cpu_threads_per_job: 1
    device: cuda
  generation:
    workers: 1
    batch_size_per_gpu: 8
  judging:
    workers: 1
    batch_size_per_gpu: 1

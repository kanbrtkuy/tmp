defaults:
  - stage1_natural_pairs_1p5b.yaml
  - ../model/deepseek_r1_distill_llama_8b.yaml

run:
  name: stage1_natural_pairs_8b_a100_1x
  output_dir: ${COT_SAFETY_RUN_ROOT:-runs}/stage1_natural_pairs_8b_a100_1x

probe:
  # Keep the same token grid as the 1.5B natural-pair run, with extra 8B
  # relative-depth layers used in earlier 8B scans.
  layers: [4, 6, 7, 8, 10, 12, 14, 16, 17, 18, 20, 21, 22, 24, 25, 26, 28, 30, 32]
  positions: [cot_0, cot_1, cot_2, cot_3, cot_4, cot_5, cot_6, cot_7, cot_8, cot_9, cot_10, cot_12, cot_16, cot_24, cot_32, cot_48, cot_64, cot_96, cot_128]
  multilayer_concat:
    positions: [cot_1, cot_2, cot_3, cot_4, cot_7, cot_8]

model:
  # Preserve naturally long same-prompt generated/generated CoTs. The previous
  # 4096-token extraction cap dropped one valid WJB unsafe trajectory; length
  # and style differences are handled by surface/truncation controls, not by
  # filtering pairs out of the primary freeze.
  max_length: 12288

runtime:
  name: a100_1x_80g_8b_hidden
  num_gpus: 1
  cuda_visible_devices: "0"
  devices: [cuda:0]
  hf_home: ${HF_HOME:-/workspace/hf-cache}
  torch_dtype: bfloat16
  pytorch_cuda_alloc_conf: expandable_segments:True
  hidden:
    extract_jobs: 1
    extract_devices: [cuda:0]
    extract_train_shards: 1
    # Retuned after strongreject_full val OOM at batch 20; batch 18 keeps
    # natural long CoTs while leaving headroom on the 80GB A100.
    batch_size_per_gpu: 18
    compression: uncompressed
  probes:
    single_scan_backend: batched
    dynamic_task_multiplier: 128
    jobs: 16
    devices: [cuda:0]
    worker_slots_per_gpu: 16
    jobs_per_gpu: 16
    scan_batch_size: 4096
    scan_eval_batch_size: 8192
    multilayer_jobs: 8
    multilayer_fallback_device: cpu
    cpu_threads_per_job: 2
    probe_timeout_seconds: 0
    device: cuda

legacy:
  hidden_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/hidden/stage1_natural_pairs_8b_a100_1x
  hidden_prefix: natural_pairs_8b_a100_1x
  log_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/logs/stage1_natural_pairs_8b_a100_1x
  single_scan_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1_natural_pairs_8b_a100_1x/linear
  multilayer_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1_natural_pairs_8b_a100_1x/multilayer

defaults:
  - stage1b_natural_pairs_32b_a100_1x.yaml

run:
  name: stage1b_natural_pairs_dense_32b_a100_1x
  output_dir: ${COT_SAFETY_RUN_ROOT:-runs}/stage1b_natural_pairs_dense_32b_a100_1x

probe:
  layers: [16, 20, 24, 28, 30, 32, 34, 36, 38, 40, 42, 44, 46, 48, 50, 52, 54, 56, 58, 60, 62, 64]
  prompt_positions: [last_prompt_token, assistant_start, assistant_last, pre_think]
  positions:
    - last_prompt_token
    - assistant_start
    - assistant_last
    - pre_think
    - think_last
    - cot_0
    - cot_1
    - cot_2
    - cot_3
    - cot_4
    - cot_5
    - cot_6
    - cot_7
    - cot_8
    - cot_9
    - cot_10
    - cot_11
    - cot_12
    - cot_16
  multilayer_concat:
    positions: [last_prompt_token, pre_think, think_last, cot_3, cot_4, cot_5, cot_6, cot_7, cot_8]

legacy:
  hidden_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/hidden/stage1b_natural_pairs_dense_32b_a100_1x
  hidden_prefix: stage1b_natural_pairs_dense_32b_a100_1x
  log_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/logs/stage1b_natural_pairs_dense_32b_a100_1x
  single_scan_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1b_natural_pairs_dense_32b_a100_1x/linear
  multilayer_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1b_natural_pairs_dense_32b_a100_1x/multilayer

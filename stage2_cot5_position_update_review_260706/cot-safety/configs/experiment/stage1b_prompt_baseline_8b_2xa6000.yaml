defaults:
  - stage1b_prompt_baseline.yaml
  - ../model/deepseek_r1_distill_llama_8b.yaml
  - ../runtime/a6000_2x.yaml

run:
  name: stage1b_prompt_baseline_deepseek_8b_2xa6000
  output_dir: ${COT_SAFETY_RUN_ROOT:-runs}/stage1b_prompt_baseline_deepseek_8b_2xa6000

probe:
  layers: [4, 6, 7, 8, 10, 12, 14, 16, 17, 18, 20, 21, 22, 24, 25, 26, 28, 30, 32]
  hidden_extraction:
    train_shards: 4

legacy:
  data_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/data/stage1_positionscan_deepseek_8b_2xa6000
  hidden_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/hidden/stage1b_prompt_baseline_deepseek_8b_2xa6000
  hidden_prefix: external_8b_stage1b
  log_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/logs/stage1b_prompt_baseline_deepseek_8b_2xa6000
  single_scan_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1b_prompt_baseline_deepseek_8b_2xa6000/linear
  multilayer_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1b_prompt_baseline_deepseek_8b_2xa6000/multilayer

defaults:
  - stage1_natural_pairs_1p5b.yaml

run:
  name: stage1_aprime_rewrite_1p5b_a100_1x
  output_dir: ${COT_SAFETY_RUN_ROOT:-runs}/stage1_aprime_rewrite_1p5b_a100_1x

data:
  prepared_data_dir: ${APRIME_STAGE1_DATA_DIR:-runs/stage1_exports/A_prime_reasoning_only}
  sources: []
  heldout_sources: []

runtime:
  name: a100_1x_80g_tuned
  num_gpus: 1
  cuda_visible_devices: "0"
  devices: [cuda:0]
  hf_home: ${HF_HOME:-/workspace/hf-cache}
  torch_dtype: bfloat16
  pytorch_cuda_alloc_conf: expandable_segments:True
  hidden:
    extract_jobs: 1
    extract_devices: [cuda:0]
    extract_train_shards: 1
    batch_size_per_gpu: 128
    compression: uncompressed
  probes:
    single_scan_backend: batched
    dynamic_task_multiplier: 128
    jobs: 128
    devices: [cuda:0]
    worker_slots_per_gpu: 64
    jobs_per_gpu: 64
    scan_batch_size: 4096
    scan_eval_batch_size: 8192
    multilayer_jobs: 32
    multilayer_fallback_device: cpu
    cpu_threads_per_job: 2
    probe_timeout_seconds: 0
    device: cuda

legacy:
  hidden_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/hidden/stage1_aprime_rewrite_1p5b_a100_1x
  hidden_prefix: aprime_rewrite_1p5b_a100_1x
  log_dir: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/logs/stage1_aprime_rewrite_1p5b_a100_1x
  single_scan_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1_aprime_rewrite_1p5b_a100_1x/linear
  multilayer_out_root: ${COT_SAFETY_HOT_ROOT:-/dev/shm/cot-safety-hot}/runs/stage1_aprime_rewrite_1p5b_a100_1x/multilayer

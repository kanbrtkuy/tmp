    - assistant_start
    - assistant_last
    - pre_think
    - think_last
    - cot_0
    - cot_1
    - cot_2
    - cot_3
    - cot_4
    - cot_5
    - cot_6
    - cot_7
    - cot_8
    - cot_9
    - cot_10
    - cot_11
    - cot_12
    - cot_16

# @package _global_

defaults:
  - override /data: deepseek_pause_sft
  - override /rl_algorithm/policy/model/language_model: deepseek_r1_distill_qwen_1_5b

run_name: "deepseek_pause3_full_sft"
tags: ["deepseek", "pause3", "full_sft"]

rl_algorithm:
  policy:
    model:
      special_tokens_to_add:
        - "<|pause|>"

trainer:
  data_collator:
    _target_: trl.DataCollatorForCompletionOnlyLM
    response_template:
      _target_: src.utils.hydra_custom_resolvers.get_module_attr
      module_and_attr: src.utils.constants.DEEPSEEK_ASSISTANT_TEMPLATE

  max_seq_length: 4096

  formatting_func:
    _target_: functools.partial
    _args_:
      - ${get_method:src.utils.trainer_utils.deepseek_pause_sft_formatting_function}
    eos_token: ${get_obj_attr:${rl_algorithm.policy.model.tokenizer},[eos_token]}

  args:
    do_train: true
    do_eval: true
    evaluation_strategy: "steps"
    save_strategy: "steps"
    eval_steps: 200
    save_steps: 200
    save_total_limit: 4
    load_best_model_at_end: true
    metric_for_best_model: eval_loss
    greater_is_better: false
    num_train_epochs: 2.0
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    learning_rate: 2e-5
    warmup_ratio: 0.03
    weight_decay: 0.0
    bf16: true
    fp16: false
    gradient_checkpointing: true
    report_to: "none"

save_before_train: false
merge_peft_after_train: false

defaults:
  - stage2_intra_pause_sft_8b_4xa100.yaml

run:
  name: stage2_intra_pause_format_only_deepseek_8b_cot4_4xa100
  output_dir: ${COT_SAFETY_OUTPUT_ROOT:-/workspace/outputs}/deepseek_8b_intra_pause_cot4_format_only_trusted_cot_18k

sft:
  method: format_only
  tags: [deepseek_8b, intra_pause_cot4, before_cot4, format_only, a100_sxm]
  learning_rate: 1.0e-3
  weight_decay: 0.0
  num_train_epochs: 1.0
  save_before_train: true
  save_total_limit: 4
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping:
    enabled: true
    patience: 2
    threshold: 0.001
  format_only:
    enabled: true
    trainable_tokens:
      - "<|pause|>"
    init_from_text: ""
